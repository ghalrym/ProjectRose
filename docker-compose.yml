services:
  roselibrary:
    build: ./RoseLibrary
    ports:
      - "8000:8000"
    volumes:
      - roselibrary-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    restart: unless-stopped

  rosemodel:
    build: ./RoseModel
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    restart: unless-stopped

  roseobservability:
    build: ./RoseObservability
    ports:
      - "8020:8020"
    volumes:
      - roseobservability-data:/data
    restart: unless-stopped

volumes:
  roselibrary-data:
  roseobservability-data:
