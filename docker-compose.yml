services:
  roselibrary:
    build: ./RoseLibrary
    ports:
      - "8000:8000"
    volumes:
      - roselibrary-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    restart: unless-stopped

  rosemodel:
    build: ./RoseModel
    ports:
      - "8010:8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    restart: unless-stopped

  rosetrainer:
    build: ./RoseTrainer
    ports:
      - "8030:8030"
    volumes:
      - ./RoseTrainer/models:/app/models
      - ./RoseTrainer/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSEMODEL_URL: http://rosemodel:8010
      OLLAMA_HOST: http://host.docker.internal:11434
      DATABASE_URL: postgresql://rosetrainer:rosetrainer@postgres:5432/rosetrainer
      MODELS_DIR: /app/models
    depends_on:
      postgres:
        condition: service_healthy
      rosemodel:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rosetrainer
      POSTGRES_USER: rosetrainer
      POSTGRES_PASSWORD: rosetrainer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosetrainer -d rosetrainer"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  roseobservability:
    build: ./RoseObservability
    ports:
      - "8020:8020"
    volumes:
      - roseobservability-data:/data
    restart: unless-stopped

volumes:
  roselibrary-data:
  roseobservability-data:
  postgres-data:
