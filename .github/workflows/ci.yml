name: CI

on:
  workflow_call:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    working-directory: ProjectRose

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ProjectRose/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run type checks
        run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ProjectRose/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run unit tests
        run: npm run test:unit

  e2e-tests:
    name: E2E Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ProjectRose/package-lock.json
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build app
        run: npm run build
      - name: Run E2E tests
        run: npm run test:e2e
