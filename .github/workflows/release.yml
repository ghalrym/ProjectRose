name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            files: ProjectRose/release/*Setup*.exe
          - os: macos-latest
            platform: mac
            files: ProjectRose/release/*arm64.dmg
          - os: ubuntu-latest
            platform: linux
            files: ProjectRose/release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Compute a unique version per build, used everywhere downstream:
      #  - Tagged push (refs/tags/v*): use the tag name verbatim.
      #  - Master push: <package-base>-build.<github.run_number>, always pre-release.
      # The version is also injected into electron-builder via
      # `-c.extraMetadata.version` so the installer/About dialog matches the
      # GitHub release tag.
      - name: Compute build version
        id: ver
        shell: bash
        run: |
          BASE=$(node -p "require('./ProjectRose/package.json').version")
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REF="${{ github.ref_name }}"
            VERSION="${REF#v}"
            TAG="${REF}"
            NAME="${REF}"
            if [[ "$REF" == *alpha* || "$REF" == *beta* || "$REF" == *rc* ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          else
            VERSION="${BASE}-build.${{ github.run_number }}"
            TAG="v${VERSION}"
            NAME="${TAG}"
            PRERELEASE="true"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (electron-builder version=$VERSION, prerelease=$PRERELEASE)"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create rosespeech placeholder (CI has no rosespeech binary)
        run: mkdir -p rosespeech-dist/rosespeech
        shell: bash

      - name: Install Python setuptools for node-gyp on Python 3.12+
        run: pip3 install setuptools --break-system-packages
        shell: bash

      - name: Copy node-pty into app node_modules for packaging
        shell: bash
        run: mkdir -p ProjectRose/node_modules && cp -r node_modules/node-pty ProjectRose/node_modules/node-pty

      - name: Compile node-pty from source (Linux has no prebuilts)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          cd ProjectRose/node_modules/node-pty
          node-gyp rebuild

      - name: Build and package
        working-directory: ProjectRose
        shell: bash
        run: npm run dist -- --${{ matrix.platform }} --publish never -c.extraMetadata.version=${{ steps.ver.outputs.version }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.name }}
          files: ${{ matrix.files }}
          draft: false
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
