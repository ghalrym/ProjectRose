name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  package-extensions:
    name: Package extensions
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Package extensions
        run: node scripts/package-extensions.mjs

      - name: Upload extension ZIPs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Nightly Build' }}
          files: dist/extensions/*.zip
          draft: false
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: ci
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Create rosespeech placeholder (CI has no rosespeech binary)
        run: mkdir -p rosespeech-dist/rosespeech
        shell: bash

      - name: Install Python setuptools for node-gyp on Python 3.12+
        run: pip3 install setuptools --break-system-packages
        shell: bash

      - name: Copy node-pty into app node_modules for packaging
        shell: bash
        run: mkdir -p ProjectRose/node_modules && cp -r node_modules/node-pty ProjectRose/node_modules/node-pty

      - name: Compile node-pty from source (Linux has no prebuilts)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          cd ProjectRose/node_modules/node-pty
          node-gyp rebuild

      - name: Build and package (Windows)
        if: matrix.platform == 'win'
        working-directory: ProjectRose
        run: npm run dist -- --win --publish never

      - name: Build and package (macOS)
        if: matrix.platform == 'mac'
        working-directory: ProjectRose
        run: npm run dist -- --mac --publish never

      - name: Build and package (Linux)
        if: matrix.platform == 'linux'
        working-directory: ProjectRose
        run: npm run dist -- --linux --publish never

      - name: Upload release artifacts (Windows)
        if: matrix.platform == 'win'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Nightly Build' }}
          files: ProjectRose/release/*Setup*.exe
          draft: false
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts (macOS)
        if: matrix.platform == 'mac'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Nightly Build' }}
          files: ProjectRose/release/*arm64.dmg
          draft: false
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release artifacts (Linux)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'nightly' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Nightly Build' }}
          files: ProjectRose/release/*.AppImage
          draft: false
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
