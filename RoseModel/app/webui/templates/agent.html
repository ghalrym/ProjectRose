{% extends "base.html" %}
{% block title %}Agent{% endblock %}
{% block content %}
<h1>Agent</h1>
{% if request.query_params.get("saved") %}
  <div class="flash">Saved.</div>
{% endif %}
<p class="description">Injected at the top of every system prompt on every request.</p>

<form method="post" action="/admin/prompts/agent">
  <textarea id="agent-editor" name="content">{{ content }}</textarea>
  <div class="btn-row" style="margin-top: 10px;">
    <button type="submit">Save</button>
  </div>
</form>

<script>
  new EasyMDE({
    element: document.getElementById("agent-editor"),
    autofocus: true,
    spellChecker: false,
    status: false,
    toolbar: ["bold","italic","heading","|","quote","code","unordered-list","ordered-list","|","link","preview","side-by-side","fullscreen"],
  });
</script>
{% endblock %}
