{% extends "base.html" %}
{% block title %}{{ filename }}{% endblock %}
{% block content %}
<div class="breadcrumb">
  <a href="/admin/prompts/skills">Skills</a>
  <span class="sep">/</span>
  <a href="/admin/prompts/skills/{{ slug }}">{{ slug }}</a>
  <span class="sep">/</span>
  {{ filename }}
</div>
<h1>{{ filename }}</h1>
{% if request.query_params.get("saved") %}
  <div class="flash">Saved.</div>
{% endif %}

<form method="post" action="/admin/prompts/skills/{{ slug }}/files/{{ filename }}">
  <textarea id="file-editor" name="content">{{ content }}</textarea>
  <div class="btn-row" style="margin-top: 10px;">
    <button type="submit">Save</button>
    <a href="/admin/prompts/skills/{{ slug }}" class="btn btn-ghost">Back</a>
  </div>
</form>

<script>
  new EasyMDE({
    element: document.getElementById("file-editor"),
    autofocus: true,
    spellChecker: false,
    status: false,
    toolbar: ["bold","italic","heading","|","quote","code","unordered-list","ordered-list","|","link","preview","side-by-side","fullscreen"],
  });
</script>
{% endblock %}
