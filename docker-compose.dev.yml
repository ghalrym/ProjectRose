services:
  roselibrary:
    build: ./RoseLibrary
    ports:
      - "8000:8000"
    volumes:
      - ./RoseLibrary/src:/app/src
      - roselibrary-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    command: uv run uvicorn roselibrary.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src

  rosemodel:
    build: ./RoseModel
    ports:
      - "8010:8010"
    volumes:
      - ./RoseModel/app:/app/app
      - ./RoseModel/main.py:/app/main.py
      - ./RoseModel/prompts:/app/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload

  roseobservability:
    build: ./RoseObservability
    ports:
      - "8020:8020"
    volumes:
      - ./RoseObservability/src:/app/src
      - ./RoseObservability/static:/app/static
      - roseobservability-data:/data
    command: uv run uvicorn roseobservability.main:app --host 0.0.0.0 --port 8020 --reload --reload-dir src

volumes:
  roselibrary-data:
  roseobservability-data:
