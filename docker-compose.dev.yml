services:
  rosetrainer:
    build: ./RoseTrainer
    ports:
      - "8030:8030"
    volumes:
      - ./RoseTrainer/app:/app/app
      - ./RoseTrainer/main.py:/app/main.py
      - ./RoseTrainer/models:/app/models
      - ./RoseTrainer/data:/app/data
      - ./pile:/app/pile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      DATABASE_URL: postgresql://rosetrainer:rosetrainer@postgres:5432/rosetrainer
      MODELS_DIR: /app/models
      PILE_DIR: /app/pile
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8030 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  rosespeech:
    build: ./RoseSpeech
    ports:
      - "8040:8040"
    volumes:
      - ./RoseSpeech/app:/app/app
      - ./RoseSpeech/main.py:/app/main.py
      - ./RoseSpeech/data:/app/data
    environment:
      DATABASE_URL: postgresql://rosetrainer:rosetrainer@postgres:5432/rosetrainer
      HUGGINGFACE_TOKEN: ${HUGGINGFACE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8040 --reload

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rosetrainer
      POSTGRES_USER: rosetrainer
      POSTGRES_PASSWORD: rosetrainer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosetrainer -d rosetrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  roseobservability:
    build: ./RoseObservability
    ports:
      - "8020:8020"
    volumes:
      - ./RoseObservability/src:/app/src
      - ./RoseObservability/static:/app/static
      - roseobservability-data:/data
    command: uv run uvicorn roseobservability.main:app --host 0.0.0.0 --port 8020 --reload --reload-dir src

volumes:
  roseobservability-data:
  postgres-data:
