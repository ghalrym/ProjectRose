services:
  roselibrary:
    build: ./RoseLibrary
    ports:
      - "8000:8000"
    volumes:
      - ./RoseLibrary/src:/app/src
      - roselibrary-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OLLAMA_BASE_URL: http://host.docker.internal:11434
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    command: uv run uvicorn roselibrary.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir src

  rosemodel:
    build: ./RoseModel
    ports:
      - "8010:8010"
    volumes:
      - ./RoseModel/app:/app/app
      - ./RoseModel/main.py:/app/main.py
      - ./RoseModel/prompts:/app/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSE_OBSERVABILITY_URL: http://roseobservability:8020
    depends_on:
      - roseobservability
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload

  rosetrainer:
    build: ./RoseTrainer
    ports:
      - "8030:8030"
    volumes:
      - ./RoseTrainer/app:/app/app
      - ./RoseTrainer/main.py:/app/main.py
      - ./RoseTrainer/models:/app/models
      - ./RoseTrainer/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ROSEMODEL_URL: http://rosemodel:8010
      OLLAMA_HOST: http://host.docker.internal:11434
      DATABASE_URL: postgresql://rosetrainer:rosetrainer@postgres:5432/rosetrainer
      MODELS_DIR: /app/models
    depends_on:
      postgres:
        condition: service_healthy
      rosemodel:
        condition: service_started
    command: uvicorn main:app --host 0.0.0.0 --port 8030 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rosetrainer
      POSTGRES_USER: rosetrainer
      POSTGRES_PASSWORD: rosetrainer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosetrainer -d rosetrainer"]
      interval: 5s
      timeout: 5s
      retries: 10

  roseobservability:
    build: ./RoseObservability
    ports:
      - "8020:8020"
    volumes:
      - ./RoseObservability/src:/app/src
      - ./RoseObservability/static:/app/static
      - roseobservability-data:/data
    command: uv run uvicorn roseobservability.main:app --host 0.0.0.0 --port 8020 --reload --reload-dir src

volumes:
  roselibrary-data:
  roseobservability-data:
  postgres-data:
