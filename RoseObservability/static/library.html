<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library · RoseObservability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold">RoseObservability</h1>
        <p class="text-xs text-slate-400">RoseLibrary searches</p>
      </div>
      <nav class="flex gap-4 text-sm">
        <a href="/" class="text-slate-300 hover:text-rose-400">Overview</a>
        <a href="/library" class="text-rose-400 font-medium">Library</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6 space-y-6">
    <section class="bg-slate-900 border border-slate-800 rounded-lg p-4">
      <h2 class="font-medium mb-3">Search latency</h2>
      <div class="h-64"><canvas id="latency-chart"></canvas></div>
    </section>
    <section class="bg-slate-900 border border-slate-800 rounded-lg">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
        <h2 class="font-medium">Searches</h2>
        <input id="filter" type="text" placeholder="Filter query…"
               class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm" />
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs uppercase text-slate-400 bg-slate-900 border-b border-slate-800">
            <tr>
              <th class="text-left px-4 py-2">Time</th>
              <th class="text-left px-4 py-2">Query</th>
              <th class="text-right px-4 py-2">Results</th>
              <th class="text-right px-4 py-2">Duration</th>
              <th class="text-left px-4 py-2">Trace</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/library.js"></script>
</body>
</html>
