<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RoseObservability</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold">RoseObservability</h1>
        <p class="text-xs text-slate-400">Traces &amp; metrics for RoseModel and RoseLibrary</p>
      </div>
      <nav class="flex gap-4 text-sm">
        <a href="/" class="text-rose-400 font-medium">Overview</a>
        <a href="/library" class="text-slate-300 hover:text-rose-400">Library</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-6 space-y-6">
    <section class="grid grid-cols-1 md:grid-cols-4 gap-4" id="tiles">
      <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
        <p class="text-xs uppercase text-slate-400 tracking-wide">Requests (60m)</p>
        <p class="text-2xl font-semibold mt-1" data-tile="total">–</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
        <p class="text-xs uppercase text-slate-400 tracking-wide">RoseModel avg</p>
        <p class="text-2xl font-semibold mt-1" data-tile="rm_avg">–</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
        <p class="text-xs uppercase text-slate-400 tracking-wide">RoseLibrary avg</p>
        <p class="text-2xl font-semibold mt-1" data-tile="rl_avg">–</p>
      </div>
      <div class="bg-slate-900 border border-slate-800 rounded-lg p-4">
        <p class="text-xs uppercase text-slate-400 tracking-wide">Errors (60m)</p>
        <p class="text-2xl font-semibold mt-1 text-rose-400" data-tile="errors">–</p>
      </div>
    </section>

    <section class="bg-slate-900 border border-slate-800 rounded-lg">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-800">
        <h2 class="font-medium">Recent requests</h2>
        <div class="flex items-center gap-3">
          <label class="text-xs text-slate-400">Service</label>
          <select id="filter-service" class="bg-slate-800 border border-slate-700 rounded px-2 py-1 text-sm">
            <option value="">All</option>
            <option value="rosemodel">RoseModel</option>
            <option value="roselibrary">RoseLibrary</option>
          </select>
          <button id="refresh" class="text-xs bg-slate-800 hover:bg-slate-700 rounded px-3 py-1 border border-slate-700">Refresh</button>
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="text-xs uppercase text-slate-400 bg-slate-900 border-b border-slate-800">
            <tr>
              <th class="text-left px-4 py-2">Time</th>
              <th class="text-left px-4 py-2">Service</th>
              <th class="text-left px-4 py-2">Endpoint</th>
              <th class="text-right px-4 py-2">Duration</th>
              <th class="text-left px-4 py-2">Status</th>
              <th class="text-left px-4 py-2">Summary</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
