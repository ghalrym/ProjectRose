<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ProjectRose · An AI-native desktop IDE and agent harness</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="ProjectRose pairs a full-featured code editor with a first-class agent runtime — agents that edit code, run commands, and act on your behalf.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f1ebdf; transition: background 0.3s ease; }
  body {
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    color: #2e2418;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }
  html { scroll-behavior: smooth; }

  /* dark mode — invert the paper to a dusk */
  html.dark { background: #1a1410; }
  html.dark body { background: #1a1410; }
  html.dark body::before { opacity: 0.25; mix-blend-mode: screen; }
  html.dark #root {
    filter: invert(0.92) hue-rotate(180deg);
  }
  /* keep raster images upright in dark mode */
  html.dark img,
  html.dark svg image { filter: invert(1) hue-rotate(180deg); }

  /* paper grain — very subtle texture across the whole page */
  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 1000;
    background-image:
      radial-gradient(circle at 30% 20%, rgba(122,42,32,0.018) 0, transparent 30%),
      radial-gradient(circle at 70% 80%, rgba(90,106,48,0.018) 0, transparent 30%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.10  0 0 0 0.06 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: multiply;
    opacity: 0.55;
  }

  @keyframes rosePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.85); }
  }
  @keyframes roseBlink {
    0%, 50% { opacity: 1; }
    50.01%, 100% { opacity: 0; }
  }

  ::selection { background: rgba(122,42,32,0.18); color: #2e2418; }

  /* scrollbar — match the paper */
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track { background: #e8e0d0; }
  ::-webkit-scrollbar-thumb { background: #b8ac94; border: 2px solid #e8e0d0; }
  ::-webkit-scrollbar-thumb:hover { background: #7a2a20; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="herbarium.jsx"></script>
<script type="text/babel" src="site.jsx"></script>
</body>
</html>
