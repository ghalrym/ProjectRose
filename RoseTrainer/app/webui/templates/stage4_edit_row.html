<tr id="row-{{ row.id }}">
  <td colspan="4">
    <form hx-put="/trainer/models/{{ row.model_id }}/stage/4/{{ row.id }}"
          hx-target="#row-{{ row.id }}" hx-swap="outerHTML"
          style="display:grid;gap:8px;padding:4px 0;">
      <div>
        <label style="margin-bottom:3px;display:block;">INPUT</label>
        <textarea name="input" rows="3" style="width:100%;">{{ row.input }}</textarea>
      </div>
      {% if row.thinking %}
      <div>
        <label style="margin-bottom:3px;display:block;">THINKING</label>
        <textarea name="thinking" rows="3" style="width:100%;">{{ row.thinking }}</textarea>
      </div>
      {% else %}
      <input type="hidden" name="thinking" value="">
      {% endif %}
      <div>
        <label style="margin-bottom:3px;display:block;">OUTPUT</label>
        <textarea name="output" rows="3" style="width:100%;">{{ row.output }}</textarea>
      </div>
      <div style="display:flex;gap:6px;">
        <button type="submit" class="btn btn-sm">Save</button>
        <button type="button" class="btn btn-sm btn-ghost"
                hx-get="/trainer/models/{{ row.model_id }}/stage/4"
                onclick="location.reload()">Cancel</button>
      </div>
    </form>
  </td>
</tr>
