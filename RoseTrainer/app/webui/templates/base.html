<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RoseTrainer — {% block title %}{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
  <style>
    :root {
      --bg:           #0d0f12;
      --surface:      #161920;
      --surface-2:    #1e2229;
      --surface-3:    #252b35;
      --border:       #2c3040;
      --text:         #e2e5ec;
      --text-2:       #adb5c4;
      --muted:        #616b7c;
      --accent:       #e05c84;
      --accent-dim:   #2d1520;
      --success-bg:   #0e2119;
      --success-bdr:  #1d4530;
      --success-text: #7ec8a0;
      --danger:       #c94040;
      --warn-bg:      #221a0e;
      --warn-bdr:     #4a3418;
      --warn-text:    #c8a060;
      --sidebar-w:    210px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .brand {
      padding: 15px 16px 14px;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-section { padding: 14px 0 6px; }
    .nav-label {
      padding: 0 14px 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .nav-link {
      display: block;
      padding: 6px 14px;
      color: var(--text-2);
      text-decoration: none;
      font-size: 13px;
      border-left: 2px solid transparent;
      transition: color 0.1s, background 0.1s;
    }
    .nav-link:hover { color: var(--text); background: var(--surface-2); }
    .nav-link.active { color: var(--text); background: var(--accent-dim); border-left-color: var(--accent); }
    main { padding: 28px 36px; max-width: 900px; width: 100%; }
    h1 { font-size: 17px; font-weight: 600; margin-bottom: 20px; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-2); }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .field { margin-bottom: 12px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.025em; color: var(--muted); margin-bottom: 4px; }
    input[type="text"], input[type="password"], input[type="url"], select, textarea {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    select option { background: var(--surface-2); }
    textarea { font-family: ui-monospace, Menlo, Consolas, monospace; min-height: 120px; resize: vertical; }
    textarea.tall { min-height: 300px; }
    .btn-row { display: flex; gap: 8px; align-items: center; margin-top: 14px; }
    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      display: inline-block;
      transition: filter 0.1s;
    }
    button:hover, .btn:hover { filter: brightness(1.12); }
    .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface-2); filter: none; color: var(--text); }
    .btn-danger { background: var(--danger); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .item-list { list-style: none; }
    .item-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .item-list li:last-child { border-bottom: none; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { color: var(--text); text-decoration: none; font-weight: 500; font-size: 13px; }
    .item-name:hover { color: var(--accent); }
    .item-meta { font-size: 12px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-3);
      color: var(--text-2);
      border: 1px solid var(--border);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-success { background: var(--success-bg); border-color: var(--success-bdr); color: var(--success-text); }
    .badge-warn { background: var(--warn-bg); border-color: var(--warn-bdr); color: var(--warn-text); }
    .badge-accent { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .flash { background: var(--success-bg); border: 1px solid var(--success-bdr); color: var(--success-text); padding: 8px 12px; border-radius: 4px; margin-bottom: 16px; font-size: 13px; }
    .warn  { background: var(--warn-bg);    border: 1px solid var(--warn-bdr);    color: var(--warn-text);    padding: 8px 12px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
    .tab-bar { display: flex; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.1s;
    }
    .tab:hover { color: var(--text-2); filter: none; }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    form.inline { display: inline; }
    .breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb .sep { margin: 0 6px; opacity: 0.4; }
    .muted { color: var(--muted); }
    .description { font-size: 13px; color: var(--text-2); margin-bottom: 18px; line-height: 1.6; }
    .empty { padding: 20px 0; text-align: center; color: var(--muted); font-size: 13px; }
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .EasyMDEContainer .CodeMirror { background: var(--surface-2); color: var(--text); border-color: var(--border); border-radius: 0 0 4px 4px; }
    .editor-toolbar { background: var(--surface); border-color: var(--border); border-radius: 4px 4px 0 0; }
    .editor-toolbar a { color: var(--text-2) !important; }
    .editor-toolbar a:hover, .editor-toolbar a.active { background: var(--surface-3) !important; border-color: var(--border) !important; }
    .editor-toolbar i.separator { border-color: var(--border); }
    .CodeMirror-cursor { border-left-color: var(--text); }
    /* Stage pipeline */
    .stage-pipeline { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
    .stage-dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      border: 2px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      text-decoration: none;
      transition: border-color 0.1s;
    }
    .stage-dot.complete { background: var(--success-bg); border-color: var(--success-bdr); color: var(--success-text); }
    .stage-dot.in_progress { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .stage-dot:hover { border-color: var(--text-2); }
    .stage-connector { width: 12px; height: 2px; background: var(--border); flex-shrink: 0; }
    /* Log pane */
    .log-pane {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 12px;
      font-family: ui-monospace, Menlo, Consolas, monospace;
      font-size: 12px;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      color: var(--text-2);
    }
    /* Progress bar */
    .progress-track { background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--border); }
    td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    td.truncate { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-2); }
    /* Checkbox groups */
    .checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .checkbox-item input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }
    /* VRAM table */
    .vram-table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 13px; }
    .vram-table th { background: var(--surface-2); padding: 8px 12px; text-align: left; font-size: 11px; color: var(--muted); border: 1px solid var(--border); }
    .vram-table td { padding: 8px 12px; border: 1px solid var(--border); }
    .vram-table tr:hover td { background: var(--surface-2); }
    /* Radio size selector */
    .size-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
    .size-option { position: relative; }
    .size-option input { position: absolute; opacity: 0; width: 0; height: 0; }
    .size-card {
      display: block; padding: 12px 10px; border: 2px solid var(--border);
      border-radius: 6px; text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--surface-2);
    }
    .size-card .size-label { font-size: 18px; font-weight: 700; color: var(--text); }
    .size-card .size-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .size-option input:checked + .size-card { border-color: var(--accent); background: var(--accent-dim); }
    .size-option input:checked + .size-card .size-label { color: var(--accent); }
  </style>
</head>
<body>
  <aside>
    <div class="brand">RoseTrainer</div>
    <nav>
      <div class="nav-section">
        <div class="nav-label">Training</div>
        <a href="/trainer/" class="nav-link" data-prefix="/trainer/" data-exact="1">My Models</a>
        <a href="/trainer/models/new" class="nav-link" data-prefix="/trainer/models/new">New Model</a>
      </div>
      <div class="nav-section">
        <div class="nav-label">Settings</div>
        <a href="/trainer/credentials" class="nav-link" data-prefix="/trainer/credentials">Providers</a>
      </div>
      <div class="nav-section">
        <div class="nav-label">API</div>
        <a href="/v1/models" class="nav-link" data-prefix="/v1/">OpenAI Compat</a>
      </div>
    </nav>
  </aside>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      const path = window.location.pathname;
      document.querySelectorAll('.nav-link[data-prefix]').forEach(function (a) {
        const prefix = a.getAttribute('data-prefix');
        const exact  = a.getAttribute('data-exact');
        const bare   = prefix.replace(/\/$/, '');
        if (exact ? (path === prefix || path === bare) : path.startsWith(bare + '/') || path === bare) {
          a.classList.add('active');
        }
      });
    })();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
