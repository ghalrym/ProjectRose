<tr id="row-{{ row.id }}">
  <td class="truncate" title="{{ row.input }}">{{ row.input[:120] }}</td>
  <td class="truncate" title="{{ row.output }}">{{ row.output[:120] }}</td>
  <td style="font-size:11px;color:var(--muted);">{{ row.source.split('/')[0] }}</td>
  <td>
    <div style="display:flex;gap:4px;">
      <button class="btn btn-sm btn-ghost"
              hx-get="/trainer/models/{{ row.model_id }}/stage/4/{{ row.id }}/edit"
              hx-target="#row-{{ row.id }}"
              hx-swap="outerHTML">Edit</button>
      <button class="btn btn-sm btn-danger"
              hx-delete="/trainer/models/{{ row.model_id }}/stage/4/{{ row.id }}"
              hx-target="#row-{{ row.id }}"
              hx-swap="outerHTML"
              hx-confirm="Delete this entry?">×</button>
    </div>
  </td>
</tr>
